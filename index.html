<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Motorsport Calendar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">2026 Motorsport Calendar</h1>
      <p class="site-subtitle">IndyCar · WEC · IMSA · GT World Challenge · IGTC · ELMS</p>
    </div>
  </header>

  <main class="container">
    <section class="filters" aria-label="Filter events">
      <div class="filter-group">
        <div class="filter-label">Series</div>
        <div id="sf" class="filter-row"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Watch in UK</div>
        <div id="wf" class="filter-row"></div>
      </div>
      <div class="filter-meta">
        <span id="stats" class="stats"></span>
        <button class="btn-reset" onclick="toggleAllS()">all / none</button>
      </div>
    </section>

    <div id="month-nav"></div>
    <div id="calendar"></div>
  </main>

  <script src="calendar.js"></script>
</body>
</html>
